<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Sign in to the private NoteLink director portal.">
  <title>Director Sign In | NoteLink</title>
  <link rel="icon" href="assets/notelink-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="director-login-body">
  <header class="director-login-header">
    <a class="brand" href="index.html" aria-label="NoteLink home">
      <img src="assets/notelink-icon.png" alt="" class="brand-icon">
      <span>NoteLink</span>
    </a>
    <a class="director-exit-link" href="index.html">Public site</a>
  </header>

  <main class="director-login-page">
    <section class="director-login-copy">
      <p class="eyebrow">Director access</p>
      <h1>Private band control.</h1>
      <p>
        Sign in with the email attached to your NoteLink band. The portal opens separately from the public site so your library tools stay focused.
      </p>
    </section>

    <form id="director-login-form" class="director-login-card">
      <div>
        <p class="eyebrow">Secure link</p>
        <h2>Enter your director email.</h2>
      </div>
      <label>
        Director email
        <input id="director-email" type="email" autocomplete="email" required>
      </label>
      <button id="send-code-button" class="button primary" type="submit">Send sign-in link</button>
      <p id="director-auth-status" class="form-status" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script type="module" src="director.js"></script>
</body>
</html>
