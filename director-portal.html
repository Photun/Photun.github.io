<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Manage your private NoteLink band library.">
  <title>Director Portal | NoteLink</title>
  <link rel="icon" href="assets/notelink-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="director-portal-body">
  <main id="director-app" class="director-portal">
    <header class="portal-shell-topbar">
      <a class="portal-brand" href="index.html" aria-label="NoteLink home">
        <img src="assets/notelink-icon.png" alt="" class="brand-icon">
        <span>NoteLink Director</span>
      </a>
      <div class="portal-topbar-actions">
        <span id="portal-email" class="portal-email"></span>
        <button id="director-sign-out" class="button secondary" type="button">Sign out</button>
      </div>
    </header>

    <section id="portal-loading" class="portal-loading">
      <p class="eyebrow">Director portal</p>
      <h1>Loading your band...</h1>
      <p id="portal-loading-status" class="form-status" role="status" aria-live="polite"></p>
    </section>

    <section id="portal-content" class="portal-content" hidden>
      <div class="portal-hero-row">
        <div>
          <p class="eyebrow">Band workspace</p>
          <h1 id="portal-title">Band portal</h1>
        </div>
        <label class="portal-band-switcher">
          Band
          <select id="band-select"></select>
        </label>
      </div>

      <div class="portal-grid">
        <section class="portal-card band-panel">
          <div class="panel-heading-inline">
            <div>
              <p class="eyebrow">Band</p>
              <h2>Settings</h2>
            </div>
          </div>
          <label>
            Band name
            <input id="band-name">
          </label>
          <label>
            Join code
            <input id="band-join-code">
          </label>
          <button id="save-band-button" class="button primary" type="button">Save band</button>
          <p id="band-status" class="form-status" role="status" aria-live="polite"></p>
        </section>

        <section class="portal-card member-panel">
          <div class="panel-heading-inline">
            <div>
              <p class="eyebrow">Members</p>
              <h2 id="member-count">0 members</h2>
            </div>
          </div>
          <div id="member-list" class="member-list"></div>
        </section>
      </div>

      <section class="portal-card upload-panel">
        <div class="panel-heading-inline">
          <div>
            <p class="eyebrow">Private music</p>
            <h2>Smart upload raw parts.</h2>
          </div>
        </div>
        <div class="portal-form-grid four">
          <label>
            Piece title
            <input id="piece-title" placeholder="Fight Song">
          </label>
          <label>
            Piece ID
            <input id="piece-id" placeholder="fight_song">
          </label>
          <label>
            Tempo
            <input id="piece-tempo" inputmode="numeric" placeholder="144">
          </label>
          <label>
            Category
            <input id="piece-category" placeholder="Pep tune">
          </label>
        </div>
        <label id="director-dropzone" class="file-picker smart">
          <strong>Drop or choose files</strong>
          <span>PNG, JPG, PDF, MusicXML, XML, MIDI, and SVG are supported. Review every mapping before upload.</span>
          <input id="piece-files" type="file" multiple accept=".png,.jpg,.jpeg,.webp,.svg,.pdf,.musicxml,.xml,.mid,.midi">
        </label>
        <label class="rights-check">
          <input id="piece-rights" type="checkbox">
          <span>I confirm this band has the rights or permission to use and upload these music files.</span>
        </label>
        <div id="upload-review" class="upload-review"></div>
        <div class="portal-actions">
          <button id="upload-piece-button" class="button primary" type="button" disabled>Upload private piece</button>
          <p id="upload-status" class="form-status" role="status" aria-live="polite"></p>
        </div>
      </section>

      <section class="portal-card">
        <div class="panel-heading-inline">
          <div>
            <p class="eyebrow">Pieces</p>
            <h2>Band-private library</h2>
          </div>
        </div>
        <div id="piece-list" class="portal-records"></div>
      </section>

      <section class="portal-card">
        <div class="panel-heading-inline">
          <div>
            <p class="eyebrow">Shorties</p>
            <h2>Text presets</h2>
          </div>
        </div>
        <div class="portal-form-grid four">
          <label>
            Title
            <input id="shorty-title" placeholder="Tag">
          </label>
          <label>
            Shorty ID
            <input id="shorty-id" placeholder="tag">
          </label>
          <label>
            Concert key
            <select id="shorty-key">
              <option>Bb</option>
              <option>C</option>
              <option>Eb</option>
              <option>F</option>
              <option>Ab</option>
              <option>Db</option>
              <option>G</option>
              <option>D</option>
            </select>
          </label>
          <label>
            Notes
            <input id="shorty-notes" placeholder="Optional">
          </label>
        </div>
        <label>
          Template text
          <textarea id="shorty-text" rows="4" placeholder=".1 .2 .3 .rpm"></textarea>
        </label>
        <div class="portal-actions">
          <button id="save-shorty-button" class="button primary" type="button">Save shorty</button>
          <p id="shorty-status" class="form-status" role="status" aria-live="polite"></p>
        </div>
        <div id="shorty-list" class="portal-records"></div>
      </section>
    </section>
  </main>

  <script type="module" src="director-portal.js"></script>
</body>
</html>
